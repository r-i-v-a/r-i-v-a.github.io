<!DOCTYPE html>
<html>

<head>
	<title>Breathe</title>
	<link rel="stylesheet" href="style1.css" />
	<meta charset="UTF-8">
</head>

<body>
	<div class="container">

		<div class="row">
			<p id="text">breathe in</p>
		</div>

		<div class="row">
			<div class="centeredContainer">
				<div id="breathe"></div>
			</div>
		</div>

		<script>
			const textElement = document.getElementById('text');
			const breatheElement = document.getElementById('breathe');
			const lengthMs = 1000;

			function breatheIn() {
				updateTextElement("breathe in");
				animateBreathe(1, 100); // Animate from 1% to 100%
			}

			function hold() {
				updateTextElement("hold");
				// No animation, just hold the current size
			}

			function breatheOut() {
				updateTextElement("breathe out");
				animateBreathe(100, 1); // Animate from 100% to 1%
			}

			const stageFunctions = [breatheIn, hold, breatheOut, hold];
			let stage = 0;

			// Helper function to animate the breathe element
			function animateBreathe(startPercent, endPercent) {
				breatheElement.style.width = `${startPercent}%`;
				breatheElement.style.height = `${startPercent}%`;
				// Force reflow to ensure the transition starts from the new size
				void breatheElement.offsetWidth;
				breatheElement.style.width = `${endPercent}%`;
				breatheElement.style.height = `${endPercent}%`;
			}

			// Helper function to sleep for a specified time
			function sleep(ms) {
				return new Promise(resolve => setTimeout(resolve, ms));
			}

			async function breatheLoop() {
				for (let i = 0; i < 100; i++) {
					console.log("stage " + stage);
					stageFunctions[stage]();
					stage = (stage + 1) % 4;
					await sleep(lengthMs); // Pause here
				}
			}

			function updateTextElement(text) {
				textElement.textContent = text;
			}

			// Start the loop
			breatheLoop();
		</script>

	</div>
</body>

</html>
