<!DOCTYPE html>
<html>

<head>
	<title>Breathe</title>
	<link rel="stylesheet" href="style1.css" />
	<meta charset="UTF-8">
</head>

<body>
	<div class="container">

		<div class="row">
			<p id="breatheText1">breathe in</p>
		</div>

		<div class="row">
			<div class="centeredContainer">
				<div id="breatheAnimation"></div>
			</div>
		</div>

		<div class="row">
			<p id="breatheText2">breathe out</p>
		</div>

		<script>
			const breatheTextElement1 = document.getElementById('breatheText1');
			const breatheTextElement2 = document.getElementById('breatheText2');
			const textElement = document.getElementById('text');
			const breatheAnimationElement = document.getElementById('breatheAnimation');
			const lengthMs = 7000;

			function breatheIn() {
				breatheTextElement1.textContent = "breathe in";
				breatheTextElement2.textContent = "...";
				animateBreathe(1, 100); // Animate from 1% to 100%
			}

			function breatheOut() {
				breatheTextElement1.textContent = "...";
				breatheTextElement2.textContent = "breathe out";
				animateBreathe(100, 1); // Animate from 100% to 1%
			}

			const stageFunctions = [breatheIn, breatheOut];
			let stage = 0;

			// Helper function to animate the breathe element
			function animateBreathe(startPercent, endPercent) {
				breatheAnimationElement.style.width = `${startPercent}%`;
				breatheAnimationElement.style.height = `${startPercent}%`;
				// Force reflow to ensure the transition starts from the new size
				void breatheAnimationElement.offsetWidth;
				breatheAnimationElement.style.width = `${endPercent}%`;
				breatheAnimationElement.style.height = `${endPercent}%`;
			}

			// Helper function to sleep for a specified time
			function sleep(ms) {
				return new Promise(resolve => setTimeout(resolve, ms));
			}

			async function breatheLoop() {
				while (true) {
					stageFunctions[stage]();
					stage = (stage + 1) % 2;
					await sleep(lengthMs); // Pause here
				}
			}

			// Start the loop
			breatheLoop();
		</script>

	</div>
</body>

</html>
